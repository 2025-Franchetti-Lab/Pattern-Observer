<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Observer — Risorse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      padding: 1.5rem 2rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    header p {
      font-size: 0.9rem;
      color: #64748b;
      margin-top: 0.25rem;
    }

    main {
      max-width: 900px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    /* --- Sezione titolo --- */
    .section-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 1rem;
    }

    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    /* --- Card documento HTML --- */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
    }

    .card:hover {
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      border-color: #c7d2fe;
      transform: translateY(-2px);
    }

    .card-icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #eef2ff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon svg {
      width: 22px;
      height: 22px;
      color: #4f46e5;
    }

    .card-info {
      min-width: 0;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-top: 0.2rem;
    }

    /* --- Video --- */
    .video-block {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 2.5rem;
    }

    .video-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #f1f5f9;
    }

    .video-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #fff1f2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .video-icon svg {
      width: 20px;
      height: 20px;
      color: #e11d48;
    }

    .video-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a2e;
    }

    .video-filename {
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .video-block video {
      display: block;
      width: 100%;
      background: #000;
    }

    footer {
      text-align: center;
      font-size: 0.78rem;
      color: #94a3b8;
      padding: 2rem 1rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Pattern Observer</h1>
  <p>Classe 4 — TEPSIT &nbsp;·&nbsp; Risorse didattiche</p>
</header>

<main>

  <!-- ===== Documenti HTML ===== -->
  <div class="section-label">Documenti</div>
  <div class="card-grid">

    <a class="card" href="observer_pattern_tutorial.html">
      <div class="card-icon">
        <!-- HTML file icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <div class="card-info">
        <div class="card-title">Tutorial — Observer Pattern</div>
        <div class="card-meta">observer_pattern_tutorial.html</div>
      </div>
    </a>

  </div>

  <!-- ===== Video ===== -->
  <div class="section-label">Video</div>

  <div class="video-block">
    <div class="video-header">
      <div class="video-icon">
        <!-- Play icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </div>
      <div>
        <div class="video-title">Il Pattern Observer</div>
        <div class="video-filename">Il_Pattern_Observer.mp4</div>
      </div>
    </div>
    <video controls preload="metadata">
      <source src="Il_Pattern_Observer.mp4" type="video/mp4" />
      Il browser non supporta la riproduzione video.
    </video>
  </div>

</main>

<footer>Pattern Observer &mdash; Classe 4 TEPSIT</footer>

</body>
</html>
